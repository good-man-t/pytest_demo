[pytest]
testpaths = testcases

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s

addopts = -v -s --tb=short --strict-markers --html=reports/report.html --self-contained-html

markers =
    smoke: 冒烟测试用例
    regression: 回归测试用例
    p0: P0 核心功能用例
    p1: P1 重要功能用例
    p2: P2 次要功能用例
    fridge: 冰箱基础功能用例
    multi_door: 多门冰箱功能用例
    sensor: 传感器相关用例
    uart: UART通信协议用例
    i2c: I2C通信协议用例
