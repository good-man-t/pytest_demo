# 冰箱测试数据

# ===== 冰箱类型 =====
fridge_types:
  - ["two_door", "双门冰箱", 2, 2]
  - ["three_door", "三门冰箱", 3, 3]
  - ["french_door", "法式多门", 4, 3]
  - ["cross_door", "十字对开门", 4, 4]
  - ["t_type_door", "T型对开门", 3, 3]

# ===== 基础温度 =====
valid_fridge_temps:
  - [1, "最低冷藏"]
  - [4, "标准冷藏"]
  - [9, "最高冷藏"]

valid_freezer_temps:
  - [-24, "最低冷冻"]
  - [-18, "标准冷冻"]
  - [-15, "最高冷冻"]

# ===== 冰箱模式 =====
modes:
  - ["normal", "标准"]
  - ["eco", "节能"]
  - ["super_cool", "速冷"]
  - ["super_freeze", "速冻"]
  - ["vacation", "假日"]

# ===== 多门冰箱 =====
multi_door:
  # three_door 间室: 0=冷藏(1~9), 1=变温(-18~5), 2=冷冻(-24~-15)
  compartment_temps:
    - [0, 1, "冷藏室最低"]
    - [0, 4, "冷藏室标准"]
    - [0, 9, "冷藏室最高"]
    - [1, -18, "变温室最低"]
    - [1, -7, "变温室标准"]
    - [1, 5, "变温室最高"]
    - [2, -24, "冷冻室最低"]
    - [2, -18, "冷冻室标准"]
    - [2, -15, "冷冻室最高"]

  door_indices:
    - [0, "第一扇门"]
    - [1, "第二扇门"]
    - [2, "第三扇门"]

# ===== 传感器 =====
sensor:
  ntc_temps:
    - [-20.0, "冷冻低温"]
    - [0.0, "零度"]
    - [25.0, "常温"]
    - [60.0, "高温"]

  ntc_faults:
    - ["short", "短路故障"]
    - ["open", "断路故障"]

  humidity_values:
    - [0.0, "干燥"]
    - [50.0, "标准"]
    - [100.0, "饱和"]

  defrost_scenarios:
    - [-15.0, 90, true, "超低温高霜"]
    - [-5.0, 85, true, "高霜触发"]
    - [-8.0, 50, false, "中等霜不触发"]
    - [-12.0, 30, true, "低温触发"]

  ambient_temps:
    - [45.0, -3.0, "高温需补偿"]
    - [35.0, -2.0, "偏高需补偿"]
    - [25.0, 0.0, "常温无补偿"]
    - [8.0, 2.0, "低温需补偿"]
    - [3.0, 4.0, "极低温需补偿"]

# ===== UART 协议 =====
uart:
  commands:
    - [1, "温度查询"]
    - [2, "温度设置"]
    - [3, "模式设置"]
    - [4, "状态上报"]
    - [5, "故障上报"]

  test_frames:
    - addr: 1
      cmd: 1
      data: [0]
      desc: "查询冷藏室温度"
    - addr: 1
      cmd: 2
      data: [0, 26]
      desc: "设置冷藏室为 26°C"
    - addr: 1
      cmd: 3
      data: [2]
      desc: "设置速冷模式"

  escape_test_data:
    - [126, "SOI 需转义"]
    - [125, "ESCAPE 需转义"]
    - [100, "正常数据"]

# ===== I2C 协议 =====
i2c:
  devices:
    - [0x50, "EEPROM"]
    - [0x48, "温度传感器"]
    - [0x68, "RTC"]

  eeprom_data:
    - [0, "地址起始"]
    - [128, "地址中间"]
    - [255, "地址末尾"]

  calibration_offsets:
    - [-2.5, "负校准"]
    - [0.0, "零校准"]
    - [3.5, "正校准"]

  i2c_temps:
    - [-40.0, "极低温"]
    - [0.0, "零度"]
    - [25.0, "常温"]
    - [85.0, "高温"]
    - [125.0, "极限高温"]

  rtc_datetime:
    year: 2026
    month: 5
    day: 21
    hour: 14
    minute: 30
    second: 0

  alarm_times:
    - [8, 0, 0, "早上八点"]
    - [22, 30, 0, "晚上十点半"]
